<header class="h-[52px] bg-brand-900 text-white flex items-center justify-between px-3 sm:px-5 sticky top-0 z-50">
  <div class="flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white/70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
    <span class="text-sm font-medium">Dashboard</span>
  </div>

  <div class="flex items-center gap-3">
    <!-- Mail/Messages icon -->
    <button
      class="border-none bg-white/10 text-white w-8 h-8 rounded-full cursor-pointer
             transition-all hover:bg-white/20 flex items-center justify-center"
      title="Messages"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </button>

    <!-- Help/Question icon -->
    <button
      class="border-none bg-white/10 text-white w-8 h-8 rounded-full cursor-pointer
             transition-all hover:bg-white/20 flex items-center justify-center"
      title="Help"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </button>

    <!-- Profile Avatar -->
    <div
      class="bg-brand-600 text-white w-8 h-8 flex items-center justify-center rounded-full
             font-semibold cursor-pointer transition-all hover:bg-brand-700 text-xs"
      title="User Profile"
    >
      T
    </div>
  </div>
</header>
