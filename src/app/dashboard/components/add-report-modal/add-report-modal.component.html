<div
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[1000] animate-fadeIn"
  (click)="onOverlayClick($event)"
>
  <div class="bg-white p-6 w-[480px] max-w-[90%] rounded-xl shadow-[0_20px_25px_-5px_rgba(0,0,0,0.1),0_10px_10px_-5px_rgba(0,0,0,0.04)]
              animate-slideUp">
    <!-- Header with title and X button -->
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold text-gray-800">Add Dashboard Report</h2>
      <button
        (click)="onClose()"
        class="w-7 h-7 flex items-center justify-center rounded-md text-gray-400
               hover:text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer border-none bg-transparent"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-1">
      <label class="text-sm text-gray-700 font-medium">Title</label>
      <input
        formControlName="title"
        class="px-3 py-2.5 rounded-md border border-gray-300 text-base sm:text-sm transition-all mb-1
               focus:outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-600/10"
      />
      <p *ngIf="titleInvalid" class="text-xs text-red-500 mb-1">Title is required</p>

      <label class="text-sm text-gray-700 font-medium mt-2">Subtitle</label>
      <input
        formControlName="subtitle"
        class="px-3 py-2.5 rounded-md border border-gray-300 text-base sm:text-sm transition-all mb-1
               focus:outline-none focus:border-brand-600 focus:ring-2 focus:ring-brand-600/10"
      />
      <p *ngIf="subtitleInvalid" class="text-xs text-red-500 mb-1">Subtitle is required</p>

      <div class="flex justify-end gap-3 mt-5">
        <button
          type="button"
          (click)="onClose()"
          class="px-5 py-2.5 rounded-md cursor-pointer text-sm font-medium
                 bg-white text-gray-700 border border-gray-300 transition-all hover:bg-gray-50"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="px-5 py-2.5 rounded-md border-none cursor-pointer text-sm font-medium
                 bg-brand-600 text-white transition-all
                 hover:bg-brand-700 hover:shadow-md"
        >
          Create
        </button>
      </div>
    </form>
  </div>
</div>
