<div class="animate-fadeIn bg-white border border-gray-200 rounded-xl p-5 shadow-sm min-w-[1000px]">
  <!-- Summary Cards Row - fixed-width bordered tiles -->
  <div class="flex gap-4 mb-5">
    <div class="border border-gray-200 rounded-lg py-3 px-5 text-center whitespace-nowrap">
      <p class="text-xs text-gray-500 mb-1">Number of Open Alerts</p>
      <p class="text-base font-semibold text-brand-600">{{ report.metrics.openAlerts }}</p>
    </div>

    <div class="border border-gray-200 rounded-lg py-3 px-5 text-center whitespace-nowrap">
      <p class="text-xs text-gray-500 mb-1">Closing Rate %</p>
      <p class="text-base font-semibold text-brand-600">{{ report.metrics.closingRate }}%</p>
    </div>

    <div class="border border-gray-200 rounded-lg py-3 px-5 text-center whitespace-nowrap">
      <p class="text-xs text-gray-500 mb-1">Oldest Unacknowledged Alert</p>
      <p class="text-base font-semibold text-brand-600">{{ report.metrics.oldestUnackDays }} Days</p>
    </div>
  </div>

  <!-- Charts - both with shadow, gap between; min-width prevents collapse on narrow viewports -->
  <div class="flex gap-5">
    <!-- Bar Chart -->
    <div class="p-4 rounded-lg shadow-[0_2px_8px_rgba(0,0,0,0.08)] min-w-0" style="flex: 1.4;">
      <h3 class="text-sm font-semibold mb-3 text-gray-800">
        Best Unit Operations with Latest Number of Alerts
      </h3>
      <canvas
        *ngIf="barChartData"
        baseChart
        type="bar"
        [data]="barChartData"
        [options]="barChartOptions"
      ></canvas>
    </div>

    <!-- Doughnut Chart -->
    <div class="p-4 rounded-lg shadow-[0_2px_8px_rgba(0,0,0,0.08)] min-w-0" style="flex: 1;">
      <h3 class="text-sm font-semibold mb-3 text-gray-800">
        Alert Rates Distribution
      </h3>
      <canvas
        *ngIf="doughnutChartData"
        baseChart
        type="doughnut"
        [data]="doughnutChartData"
        [options]="doughnutChartOptions"
        [plugins]="doughnutPlugins"
      ></canvas>
    </div>
  </div>
</div>
