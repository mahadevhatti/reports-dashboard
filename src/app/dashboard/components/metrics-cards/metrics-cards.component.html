<div *ngIf="report" class="flex flex-wrap gap-3 sm:gap-4 mb-5 animate-fadeIn">
  <!-- Last 7 Days -->
  <div class="bg-white border border-gray-200 rounded-xl p-3 sm:p-5 shadow-sm flex items-center gap-4 flex-1 min-w-[140px] sm:min-w-[200px]">
    <div class="w-10 h-10 bg-brand-100 rounded-full flex items-center justify-center flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
    </div>
    <div class="flex-1">
      <p class="text-sm font-semibold text-gray-800 mb-2">Last 7 Days</p>
      <div class="w-full h-2.5 bg-gray-200 rounded-full overflow-hidden">
        <div
          class="h-full bg-brand-600 rounded-full animate-progressSlide"
          style="width: 60%"
        ></div>
      </div>
    </div>
  </div>

  <!-- Open Alerts -->
  <div class="bg-white border border-gray-200 rounded-xl p-3 sm:p-5 shadow-sm flex items-center gap-4 flex-1 min-w-[140px] sm:min-w-[200px]">
    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
    </div>
    <div>
      <p class="text-2xl font-bold text-gray-800">{{ report.metrics.openAlerts }}</p>
      <p class="text-xs text-gray-500">Open Alerts</p>
    </div>
  </div>

  <!-- Closing Rate -->
  <div class="bg-white border border-gray-200 rounded-xl p-3 sm:p-5 shadow-sm flex items-center gap-4 flex-1 min-w-[140px] sm:min-w-[200px]">
    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <div>
      <p class="text-2xl font-bold text-gray-800">{{ report.metrics.closingRate }}%</p>
      <p class="text-xs text-gray-500">Closing Rate %</p>
    </div>
  </div>

  <!-- Oldest Unacknowledged -->
  <div class="bg-white border border-gray-200 rounded-xl p-3 sm:p-5 shadow-sm flex items-center gap-4 flex-1 min-w-[140px] sm:min-w-[200px]">
    <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <div>
      <p class="text-2xl font-bold text-gray-800">
        {{ report.metrics.oldestUnackDays }}
        <span class="text-sm font-normal text-gray-400">Days</span>
      </p>
      <p class="text-xs text-gray-500">Oldest Unacknowledged Alert</p>
    </div>
  </div>
</div>
