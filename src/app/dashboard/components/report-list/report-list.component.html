<div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm flex flex-col h-full">
  <h3 class="text-sm font-semibold mb-3 text-gray-800 flex-shrink-0">Select Report Dashboard</h3>

  <!-- Search + ADD -->
  <div class="mb-3 flex-shrink-0 flex gap-2">
    <app-search-bar
      class="flex-1 min-w-0"
      (searchChange)="searchChange.emit($event)"
    ></app-search-bar>
    <button
      (click)="addClick.emit()"
      class="px-4 py-1.5 bg-brand-600 text-white border-none rounded-md cursor-pointer
             font-medium text-sm hover:bg-brand-700 transition-colors whitespace-nowrap"
    >
      ADD
    </button>
  </div>

  <!-- Report Items - scrollable -->
  <div class="flex-1 overflow-y-auto min-h-0 scrollbar-thin">
    <ng-container *ngIf="reports.length > 0; else emptyState">
      <div
        *ngFor="let report of reports; trackBy: trackByReportId"
        (click)="onSelect(report.id)"
        class="flex items-center justify-between py-2.5 px-2 cursor-pointer border-b border-gray-100
               last:border-b-0 hover:bg-gray-50 transition-colors"
      >
        <span class="text-sm text-gray-700">{{ report.title }}</span>
        <input
          type="checkbox"
          [checked]="selectedId === report.id"
          (change)="onSelect(report.id)"
          (click)="$event.stopPropagation()"
          class="cursor-pointer w-4 h-4 accent-brand-600 flex-shrink-0 ml-2"
        />
      </div>
    </ng-container>

    <ng-template #emptyState>
      <div class="flex items-center justify-center py-8 text-gray-400 text-sm">
        No reports found
      </div>
    </ng-template>
  </div>

  <!-- Pagination - pinned at bottom -->
  <div class="mt-3 pt-3 border-t border-gray-100 flex-shrink-0">
    <app-pagination
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      [totalEntries]="totalEntries"
      (pageChange)="pageChange.emit($event)"
    ></app-pagination>
  </div>
</div>
