<div class="h-screen flex flex-col overflow-hidden bg-[#f0f0f5]">
  <app-header></app-header>

  <div *ngIf="!reportService.loading; else loadingTpl"
       class="flex-1 overflow-y-auto px-6 py-4">
    <!-- Take-Home Section Title -->
    <div class="flex items-center gap-3 mb-5">
      <div class="w-9 h-9 bg-brand-600 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-800">Take-Home</h2>
    </div>

    <!-- Metrics Cards Row - Full Width -->
    <app-metrics-cards
      [report]="reportService.selectedReport"
    ></app-metrics-cards>

    <!-- Two-Column Layout: Report List (left fixed) + Charts Area (right scrollable) -->
    <div class="flex gap-5 items-start">
      <!-- Left Column: Report List - fixed width, stretches to match right side -->
      <div class="w-[300px] flex-shrink-0 self-stretch">
        <app-report-list
          [reports]="reportService.paginatedReports"
          [selectedId]="reportService.selectedReport?.id ?? ''"
          [currentPage]="reportService.currentPage"
          [totalPages]="reportService.totalPages"
          [totalEntries]="reportService.totalEntries"
          (selectReport)="reportService.selectReport($event)"
          (searchChange)="reportService.search($event)"
          (addClick)="openModal()"
          (pageChange)="reportService.changePage($event)"
        ></app-report-list>
      </div>

      <!-- Right Column: Summary + Charts - takes remaining space, scrolls internally on overflow -->
      <div class="flex-1 min-w-0 overflow-x-auto">
        <app-report-charts
          *ngIf="reportService.selectedReport"
          [report]="reportService.selectedReport"
        ></app-report-charts>
      </div>
    </div>
  </div>

  <ng-template #loadingTpl>
    <div class="flex flex-1 items-center justify-center p-10 text-gray-500">
      <div class="flex flex-col items-center gap-3">
        <div class="w-8 h-8 border-4 border-brand-600 border-t-transparent rounded-full animate-spin"></div>
        <p>Loading reports...</p>
      </div>
    </div>
  </ng-template>

  <app-add-report-modal
    *ngIf="showModal"
    (close)="closeModal()"
    (reportSubmit)="onReportAdded($event)"
  ></app-add-report-modal>
</div>
